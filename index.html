<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>CAIRN — Director Console</title>
<style>
  :root{
    --stone-0:#15130f;--stone-1:#1d1a14;--stone-2:#272219;--line:#33291d;
    --bone:#ece5d6;--muted:#9d9384;--faint:#6f675a;
    --ember:#e6913f;--ember-dim:#a9692f;--cold:#7d93a3;--good:#9bb38b;--bad:#c1736a;--cairn:#bcae96;--gravl:#d9c24a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--stone-0);color:var(--bone);
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;}
  .wrap{max-width:1000px;margin:0 auto;padding:0 16px 90px;}
  .mono{font-family:ui-monospace,Menlo,Consolas,monospace;}
  header{padding:22px 16px 16px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#1a1711,#15130f);}
  .head-inner{max-width:1000px;margin:0 auto;display:flex;flex-wrap:wrap;align-items:flex-end;gap:14px;justify-content:space-between;}
  .brand{display:flex;align-items:baseline;gap:12px;}
  .brand h1{font-family:Georgia,serif;font-size:30px;letter-spacing:.16em;margin:0;font-weight:600;}
  .brand h1 .em{color:var(--ember);}
  .brand .sub{color:var(--muted);font-size:12px;letter-spacing:.22em;text-transform:uppercase;}
  .season-tag{font-family:Georgia,serif;color:var(--bone);font-size:13px;}
  .season-tag b{color:var(--ember);}
  .gravl-mark{color:var(--gravl);font-weight:600;letter-spacing:.05em;}
  .controls{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}
  button.ctl{appearance:none;border:1px solid var(--line);background:var(--stone-2);color:var(--bone);
    font-size:12.5px;letter-spacing:.04em;padding:9px 13px;border-radius:2px;cursor:pointer;
    transition:border-color .15s,background .15s,transform .05s;}
  button.ctl:hover{border-color:var(--ember-dim);background:#2c2519;}
  button.ctl:active{transform:translateY(1px);}
  button.ctl.primary{border-color:var(--ember-dim);color:#f6e9d6;background:linear-gradient(180deg,#3a2c18,#2a2013);}
  button.ctl.primary:hover{border-color:var(--ember);}
  button.ctl:focus-visible{outline:2px solid var(--ember);outline-offset:2px;}
  nav.tabs{display:flex;flex-wrap:wrap;gap:2px;margin:18px 0 14px;border-bottom:1px solid var(--line);}
  .tab{padding:9px 14px;font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);
    cursor:pointer;border-bottom:2px solid transparent;user-select:none;}
  .tab:hover{color:var(--bone);}
  .tab.active{color:var(--ember);border-bottom-color:var(--ember);}
  .panel{display:none;}
  .panel.active{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.panel.active{animation:none}}
  .feed-item{border:1px solid var(--line);border-radius:3px;background:var(--stone-1);padding:14px 16px;margin-bottom:12px;}
  .feed-item .kicker{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--faint);margin-bottom:6px;display:flex;gap:8px;align-items:center;}
  .feed-item.final .kicker{color:var(--ember);}
  .feed-item.note .kicker{color:var(--cold);}
  .feed-item.small{padding:9px 14px;opacity:.82;}
  .feed-item h3{font-family:Georgia,serif;font-size:17px;margin:0 0 6px;font-weight:600;}
  .feed-item.small h3{font-size:14px;margin:0;}
  .feed-item p{margin:6px 0 0;color:var(--muted);font-size:14px;line-height:1.55;}
  .feed-empty{color:var(--faint);font-style:italic;padding:30px 6px;text-align:center;}
  .tag-pill{font-size:10px;letter-spacing:.1em;border:1px solid var(--line);border-radius:10px;padding:1px 7px;color:var(--muted);text-transform:uppercase;}
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:left;color:var(--faint);font-weight:600;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;padding:8px 10px;border-bottom:1px solid var(--line);cursor:pointer;}
  th:hover{color:var(--muted);}
  td{padding:8px 10px;border-bottom:1px solid #221c14;}
  tr:hover td{background:#1b1812;}
  tr.cut td{border-bottom:1px solid var(--ember-dim);}
  tr.below td{color:var(--faint);}
  .grav{font-family:ui-monospace,monospace;font-weight:600;}
  .role{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);}
  .unmarked{color:var(--ember);}
  .good{color:var(--good);}
  .nm{color:var(--bone);} .nm .tg{color:var(--ember);} .age{color:var(--faint);}
  .match{display:flex;justify-content:space-between;align-items:center;gap:10px;border:1px solid var(--line);background:var(--stone-1);border-radius:3px;padding:9px 12px;margin-bottom:7px;font-size:14px;flex-wrap:wrap;}
  .match .side{display:flex;align-items:center;gap:8px;}
  .match .win{color:var(--bone);font-weight:600;}
  .match .lose{color:var(--faint);}
  .match .ms{font-family:ui-monospace,monospace;color:var(--muted);font-size:13px;}
  .yard{border:1px solid var(--line);border-radius:4px;background:radial-gradient(120% 80% at 50% 120%, #20180f 0%, #16120c 60%);padding:20px 16px;min-height:120px;display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end;}
  .cairn{display:flex;flex-direction:column;align-items:center;gap:6px;width:64px;text-align:center;}
  .stones{display:flex;flex-direction:column;align-items:center;gap:2px;}
  .stones i{display:block;background:var(--cairn);border-radius:40% 40% 30% 30%;opacity:.9;}
  .cairn:hover .stones i{background:var(--ember);}
  .cairn.crown .stones i{background:var(--gravl);}
  .cairn.crown:hover .stones i{background:#f0d96a;}
  .cairn.masters .stones i{background:var(--good);}
  .cairn.masters:hover .stones i{background:#b9d6a4;}
  .cairn .clabel{font-size:9.5px;color:var(--muted);letter-spacing:.04em;line-height:1.25;}
  .cairn .cyear{font-family:ui-monospace,monospace;font-size:10px;color:var(--faint);}
  .yard-empty{color:var(--faint);font-style:italic;}
  .story-card{border:1px solid var(--line);border-radius:3px;background:var(--stone-1);padding:14px 16px;margin-bottom:12px;}
  .story-card h4{margin:0 0 4px;font-family:Georgia,serif;font-size:15px;}
  .story-card .lede{color:var(--ember);font-size:12px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;}
  .story-card p{margin:4px 0;color:var(--muted);font-size:13.5px;line-height:1.5;}
  .row2{display:flex;justify-content:space-between;border-bottom:1px solid #221c14;padding:7px 0;font-size:14px;}
  .row2:last-child{border-bottom:none;}
  .row2 .ct{font-family:ui-monospace,monospace;color:var(--ember);}
  .hint{color:var(--faint);font-size:12px;margin:2px 0 14px;}
  .desk{border-left:2px solid var(--ember);padding:8px 0 2px 14px;margin-top:10px;}
  .desk-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ember);margin-bottom:6px;}
  .desk p{font-family:Georgia,serif;color:var(--bone);font-size:14.5px;line-height:1.62;margin:0 0 9px;}
  .desk-loading{margin-top:9px;color:var(--ember);font-style:italic;font-size:13px;animation:pulse 1.2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
  @media (prefers-reduced-motion:reduce){.desk-loading{animation:none}}
  .desk-err{color:var(--bad);font-size:12px;margin-top:7px;}
  button.ctl.narrate{margin-top:10px;border-color:var(--ember-dim);}
  .cast-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;gap:10px;}
  .cast-title{font-family:Georgia,serif;font-size:18px;}
  .cast-stage{color:var(--ember);font-size:12px;letter-spacing:.12em;text-transform:uppercase;white-space:nowrap;}
  .bracket{font-size:12px;color:var(--muted);background:var(--stone-1);border:1px solid var(--line);border-radius:3px;padding:8px 10px;margin-bottom:10px;}
  .brk-row{padding:2px 0;}
  .brk-lab{color:var(--faint);display:inline-block;width:26px;}
  .brk-tie{display:inline-block;margin:1px 4px 1px 0;padding:1px 6px;border-radius:8px;border:1px solid transparent;}
  .brk-tie b{color:var(--bone);}
  .brk-tie.live{border-color:var(--ember-dim);color:var(--bone);}
  .scoreboard{display:flex;align-items:center;justify-content:space-between;border:1px solid var(--line);border-radius:4px;background:radial-gradient(120% 140% at 50% 0%,#231a10,#16120c);padding:12px 16px;margin-bottom:12px;}
  .sb-team{font-family:Georgia,serif;font-size:19px;flex:0 0 auto;}
  .sb-mid{text-align:center;flex:1;}
  .sb-series{font-family:ui-monospace,monospace;font-size:13px;color:var(--muted);}
  .sb-map{font-family:ui-monospace,monospace;font-size:22px;color:var(--ember);margin:2px 0;}
  .sb-zone{font-size:11px;color:var(--faint);}
  .cast-ctl{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;}
  .pbp{display:flex;flex-direction:column;max-height:330px;overflow:auto;border:1px solid var(--line);border-radius:3px;background:var(--stone-1);}
  .pbp-line{font-size:12.5px;padding:7px 11px;border-bottom:1px solid #211b13;color:var(--muted);font-family:ui-monospace,monospace;line-height:1.45;}
  .pbp-line.mapend{color:var(--bone);background:#1d1810;}
  .pbp-line.win{color:var(--ember);background:#211a10;font-family:inherit;}
  .pbp-line.champion{color:var(--cairn);background:#231d12;font-family:Georgia,serif;}
  .pbp-line.map{color:var(--faint);}
  .champ-banner{border:1px solid var(--ember-dim);border-radius:4px;background:radial-gradient(120% 160% at 50% 0%,#2a2012,#16120c);padding:16px;text-align:center;margin-bottom:12px;}
  .champ-name{font-family:Georgia,serif;font-size:22px;color:#f6e9d6;}
  .champ-sub{color:var(--muted);font-size:13px;margin-top:5px;}
  .faint{color:var(--faint);}
  .cast-tabs{display:flex;gap:6px;margin-bottom:8px;}
  .ctab{font:inherit;font-size:12px;color:var(--muted);background:var(--stone-1);border:1px solid var(--line);border-radius:3px;padding:5px 12px;cursor:pointer;}
  .ctab.on{color:var(--bg);background:var(--ember);border-color:var(--ember);}
  .boxwrap{border:1px solid var(--line);border-radius:3px;background:var(--stone-1);padding:8px 10px;}
  .bx-cap{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;}
  .bx-team{font-family:Georgia,serif;font-size:14px;color:var(--bone);margin:8px 0 3px;}
  .bx-coach{font-family:inherit;font-size:11px;color:var(--faint);}
  table.bx{width:100%;border-collapse:collapse;font-family:ui-monospace,monospace;font-size:12px;}
  table.bx th{text-align:right;color:var(--faint);font-weight:400;padding:2px 6px;font-size:10.5px;}
  table.bx th:first-child{text-align:left;}
  table.bx td{text-align:right;padding:3px 6px;border-bottom:1px solid #211b13;}
  table.bx td.bx-nm{text-align:left;}table.bx td.bx-k{color:var(--ember);}td.bx-v{color:var(--cairn);}
  .scout{border:1px solid var(--ember-dim);border-radius:4px;background:radial-gradient(120% 160% at 50% 0%,#221a10,#15110b);padding:12px 14px;margin-bottom:12px;}
  .scout-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px;}
  .scout-nm{font-family:Georgia,serif;font-size:16px;}
  .scout-sub{color:var(--muted);font-size:12px;margin-top:2px;}
  .scout-cols{display:flex;gap:16px;flex-wrap:wrap;}
  .scout-attrs{flex:1;min-width:180px;}
  .atr{display:flex;align-items:center;gap:8px;margin:3px 0;font-size:11px;}
  .atr-l{width:54px;color:var(--muted);}
  .atr-bar{flex:1;height:6px;background:#241d13;border-radius:3px;overflow:hidden;}
  .atr-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--ember-dim),var(--ember));}
  .atr-v{width:22px;text-align:right;font-family:ui-monospace,monospace;color:var(--bone);}
  .scout-stats{flex:1;min-width:150px;}
  .ss{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid #211b13;}
  .ss span{color:var(--muted);}.ss b{font-family:ui-monospace,monospace;}
  tr.sel{background:#241c10;}
  tr[data-pid]{cursor:pointer;}
  .pfilter{display:flex;gap:6px;margin-bottom:10px;}
  .scout-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;border-top:1px solid var(--line);padding-top:11px;}
  .mact{font:inherit;font-size:12px;color:var(--bone);background:var(--stone-1);border:1px solid var(--ember-dim);border-radius:3px;padding:5px 11px;cursor:pointer;}
  .mact:hover{border-color:var(--ember);}
  .move-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(54px,1fr));gap:5px;margin-top:9px;}
  .movebtn{font:inherit;font-size:11px;font-family:ui-monospace,monospace;color:var(--muted);background:var(--stone-1);border:1px solid var(--line);border-radius:3px;padding:6px 4px;cursor:pointer;}
  .movebtn.t2{opacity:.62;}
  .movebtn.cur{border-color:var(--ember);color:var(--ember);}
  .movebtn:hover{border-color:var(--ember);color:var(--bone);}
  .mact.on{background:var(--ember);color:var(--bg);border-color:var(--ember);}
  .step{font:inherit;font-size:14px;min-width:26px;height:24px;line-height:1;color:var(--bone);background:var(--stone-1);border:1px solid var(--ember-dim);border-radius:3px;cursor:pointer;padding:0;}
  .atr.edit{gap:5px;}
  .editmeta{display:flex;gap:8px;align-items:center;margin-top:9px;font-size:12px;color:var(--muted);flex-wrap:wrap;}
  .createfa{border:1px solid var(--ember-dim);border-radius:4px;padding:10px;margin-bottom:12px;background:var(--stone-1);}
  .cf-row{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap;align-items:center;}
  .cf-row input,.cf-row select{font:inherit;font-size:13px;background:#15110b;border:1px solid var(--line);border-radius:3px;color:var(--bone);padding:6px 8px;flex:1;min-width:64px;}
  .cf-row input[type=number]{max-width:64px;flex:0 0 auto;}
  .career-path{font-size:11.5px;color:var(--muted);margin:8px 0 2px;line-height:1.7;}
  .cp-l{color:var(--faint);text-transform:uppercase;letter-spacing:.1em;font-size:10px;margin-right:4px;}
  .cp-tm{font-family:ui-monospace,monospace;color:var(--bone);}
  .cp-s{color:var(--faint);font-size:10px;margin-left:2px;}
  .cp-arr{color:var(--ember-dim);margin:0 3px;}
  .teamcard .tc-sec{border-top:1px solid var(--line);margin-top:12px;padding-top:10px;}
  .teamcard .tc-sec .lede{margin-bottom:6px;}
  .trow{display:flex;align-items:center;gap:8px;padding:7px 6px;border-radius:4px;cursor:pointer;border:1px solid transparent;}
  .trow:hover{background:var(--stone-1);border-color:var(--ember-dim);}
  .trow .trole{font-family:ui-monospace,monospace;font-size:10px;color:var(--faint);text-transform:uppercase;width:30px;flex:0 0 auto;}
  .trow .tnm{flex:1;min-width:0;}
  .trow .tstat{width:46px;text-align:right;flex:0 0 auto;font-size:12px;}
  .trow.nolink{cursor:default;}
  .trow.nolink:hover{background:none;border-color:transparent;}
  .df-note{margin:11px 0 0;color:var(--muted);font-size:13.5px;line-height:1.62;font-style:italic;}
  .dflist{margin-top:4px;}
  .dfrow.sel{background:var(--stone-1);border-color:var(--ember);}
  .rec{display:flex;gap:10px;align-items:flex-start;padding:9px 4px;border-bottom:1px solid var(--line);}
  .rec.tap{cursor:pointer;border-radius:4px;}
  .rec.tap:hover{background:var(--stone-1);}
  .rec-sc{flex:0 0 auto;min-width:34px;text-align:center;font-family:ui-monospace,monospace;font-weight:700;color:var(--ember);background:var(--stone-1);border:1px solid var(--ember-dim);border-radius:4px;padding:3px 4px;font-size:13px;}
  .rec-b{flex:1;min-width:0;}
  .rec-x{font-size:13.5px;line-height:1.5;color:var(--bone);}
  .rec-m{font-size:11px;color:var(--faint);margin-top:2px;text-transform:uppercase;letter-spacing:.06em;}
  .goat-seasons{margin-top:8px;padding-top:8px;border-top:1px solid var(--line);font-size:11.5px;line-height:1.9;color:var(--muted);}
  .goat-seasons .gs{margin-right:9px;white-space:nowrap;}
  .goat-seasons .gs .cp-s{margin-right:1px;}
  .traits{display:flex;flex-wrap:wrap;gap:5px;margin:9px 0 2px;}
  .trait{font-size:10px;letter-spacing:.05em;border:1px solid var(--line);border-radius:9px;padding:1px 8px;background:#1a1610;cursor:help;}
  .t2pill{font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);border:1px solid var(--line);border-radius:6px;padding:0 4px;margin-left:3px;vertical-align:middle;}
  .txn{font-size:12.5px;color:var(--muted);padding:5px 0;border-bottom:1px solid #211b13;line-height:1.4;}
  .txn-s{color:var(--faint);font-family:ui-monospace,monospace;font-size:11px;margin-right:4px;}
  .txn-b{display:inline-block;font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;padding:1px 5px;border-radius:7px;margin-right:6px;border:1px solid var(--line);color:var(--muted);}
  .txn-drop,.txn-relegate{color:#d98a8a;border-color:#5a3030;}
  .txn-sign,.txn-callup,.txn-promote{color:var(--cairn);border-color:var(--ember-dim);}
  .txn-injury{color:var(--unmarked);border-color:#5a3030;}
  .txn-standin{color:var(--ember);border-color:var(--ember-dim);}
  .txn-return,.txn-rookie{color:var(--good,#8fb98f);}
  .tline{display:flex;flex-direction:column;}
  .tl-row{display:flex;gap:12px;padding:11px 4px;border-bottom:1px solid var(--line);align-items:flex-start;}
  .tl-when{flex:0 0 auto;width:50px;text-align:center;}
  .tl-ic{display:block;font-size:17px;color:var(--ember);line-height:1.25;}
  .tl-s{display:block;font-family:ui-monospace,monospace;font-size:10.5px;color:var(--faint);}
  .tl-b{flex:1;min-width:0;}
  .tl-t{font-family:Georgia,serif;font-size:14.5px;color:var(--bone);margin-bottom:2px;}
  .tl-x{font-size:13px;color:var(--muted);line-height:1.5;}
  .tl-rivalry .tl-ic,.tl-dynasty .tl-ic,.tl-worlds .tl-ic{color:var(--gravl);}
  .tl-upset .tl-ic{color:var(--cold);}
  .tl-first .tl-ic,.tl-marked .tl-ic{color:var(--cairn);}
  .tl-deadlift .tl-ic,.tl-streak .tl-ic{color:var(--ember);}
  table.perf{width:100%;border-collapse:collapse;font-size:13px;}
  table.perf th{text-align:left;color:var(--faint);font-weight:600;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:6px 8px;border-bottom:1px solid var(--line);}
  table.perf td{padding:6px 8px;border-bottom:1px solid #221c14;vertical-align:middle;}
  table.perf tr[data-tpid]{cursor:pointer;}
  table.perf tr:hover td{background:#1b1812;}
  table.perf tr.boxrow td,table.perf tr.boxrow:hover td{background:#15110b;padding:4px 8px 10px;}
  .boxbtn{font:inherit;font-size:10.5px;color:var(--muted);background:var(--stone-1);border:1px solid var(--ember-dim);border-radius:3px;padding:1px 6px;margin-left:6px;cursor:pointer;vertical-align:middle;}
  .boxbtn:hover{border-color:var(--ember);color:var(--bone);}
  .boxbtn.on{background:var(--ember);color:var(--stone-0);border-color:var(--ember);}
  .as-team{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:7px;margin-top:4px;}
  .as-slot{border:1px solid var(--line);border-radius:4px;background:var(--stone-1);padding:7px 9px;cursor:pointer;}
  .as-slot.nolink{cursor:default;}
  .as-slot:not(.nolink):hover{border-color:var(--ember-dim);}
  .as-slot .as-role{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);}
  .as-slot .as-nm{font-size:13px;color:var(--bone);margin:2px 0 1px;}
  .as-slot .as-meta{font-size:11px;color:var(--muted);}
</style>
</head>
<body>
<header>
  <div class="head-inner">
    <div class="brand">
      <h1>CAIR<span class="em">N</span></h1>
      <div>
        <div class="sub">Director Console</div>
        <div class="season-tag">Season <b id="seasonNo">1</b> · <span id="stageNo">pre-season</span> · <span id="yearNo">2016</span> · powered by <span class="gravl-mark">GRAVL</span></div>
      </div>
    </div>
    <div class="controls">

// Talent tiers: most players are ordinary, a rare few are generational, some are scrubs. `pot` is the
// developmental ceiling a young player climbs toward — so a generational rookie actually becomes a star,
// while a low-ceiling journeyman plateaus. This keeps a wide, self-renewing spread across the eras.
function rollTalent(){const r=rnd();
  if(r<0.02)return {mean:82,spread:6,pot:clamp(92+rnd()*7,90,99)};   // generational
  if(r<0.12)return {mean:72,spread:7,pot:clamp(82+rnd()*10,82,98)};  // star
  if(r<0.72)return {mean:62,spread:8,pot:clamp(69+rnd()*13,66,90)};  // solid
  if(r<0.90)return {mean:54,spread:8,pot:clamp(59+rnd()*11,54,78)};  // fringe
  return {mean:46,spread:7,pot:clamp(49+rnd()*10,45,66)};            // scrub
}
function ratingsFor(role){
  const tal=rollTalent();const b=()=>tal.mean+gauss()*tal.spread;
  let r={aim:b(),read:b(),clutch:b(),entry:b(),util:b(),consistency:b()};
  if(role==="reach"){r.aim+=16;r.clutch+=10;}
  if(role==="breaker"){r.entry+=18;r.aim+=7;}
  if(role==="anchor"){r.util+=11;r.consistency+=13;}
  if(role==="set"){r.util+=18;r.read+=9;}
  if(role==="read"){r.read+=20;r.aim-=9;}
  for(const k in r)r[k]=clamp(r[k],26,99);
  return {r,pot:Math.round(tal.pot)};
}

/* ---- cinematic variance: form, confidence, momentum ---- */

// per-map form: volatile players (low consistency) swing harder; a fat tail gives career games and no-shows.
function rollForm(p){let sigma=0.09+(100-p.r.consistency)/100*0.15;

// confidence resets each series; on the big stage the fragile start rattled and the cool start composed.
function initSeriesState(a,b,stage){lineup(a).concat(lineup(b)).forEach(p=>{p._conf=0;p._cl=0;
  if(stage){let c=(poise(p)-0.72)*0.9;
    if(hasTrait(p,'bigGame'))c=Math.abs(c)*0.3+0.32;   // the big-stage player walks out taller
    if(hasTrait(p,'headcase'))c=-Math.abs(c)-0.28;      // the front-runner tightens up

function mapDone(sa,sb){return (Math.max(sa,sb)>=15&&Math.abs(sa-sb)>=2)||Math.max(sa,sb)>=24;} // first to 15, win by 2 in OT

    e.dmg=Math.round(e.k*(88+rnd()*52)+e.a*(26+rnd()*30)+(e.surv?10:0)+(e.open?22:0)+p.r.aim*0.18*rnd());});

      +(e.clutch?0.22+0.06*e.clutch:0)+(e.mk>=4?0.18:e.mk===3?0.10:e.mk===2?0.04:0)

function simMap(a,b,ctx,opts){

/* events & season */
// Seeding leans on current-season Circuit Points, with a little weight from last season so the first
// events of a fresh season aren't a coin flip (a preseason ranking, like real circuits).
function seedScore(t){return (t.gravl||0)+(t.lastGravl||0)*0.2;}
function fieldFor(tier){
  const T=TIERS[tier];const ranked=[...world.teams].sort((x,y)=>seedScore(y)-seedScore(x));
  if(T.swiss){ // premier events: top 16 by points, open to both divisions
    if(tier==='SP'&&world.majorChamps.length===0){
      const seeds=['VNG','LG','HEMI'].map(s=>world.teams.find(t=>t.short===s)).filter(Boolean);
      return seeds.concat(ranked.filter(t=>!seeds.includes(t))).slice(0,16);
    }
    return ranked.slice(0,16);
  }
  // feeders are tier-split: a tier-1 circuit (A/B) and a tier-2 circuit (C/D)
  let pool=T.feeder==='hi'?ranked.filter(t=>t.div===1):T.feeder==='lo'?ranked.filter(t=>t.div===2):ranked;
  if(pool.length<8)pool=ranked; // safety if a division is thin
  if(tier==='A'||tier==='C'){const top=pool.slice(0,4),rest=shuffle(pool.slice(4)).slice(0,4);return shuffle(top.concat(rest));}
  return shuffle(pool.slice(0,Math.max(8,Math.min(12,pool.length)))).slice(0,8); // B/D: more open
}
// 16-team Swiss group stage: pair on equal records, 3 wins advance to the playoff bracket, 3 losses out.
// High-stakes matches (a side at 2 wins or 2 losses) are best-of-3; the rest best-of-1.
function runSwiss(field,ctx){
  const rec=new Map();field.forEach((t,i)=>rec.set(t,{w:0,l:0,seed:i}));
  const advanced=[],eliminated=[];let active=field.slice(),round=0;
  while(active.length&&round++<12){
    const groups={};active.forEach(t=>{const r=rec.get(t);(groups[r.w+'-'+r.l]=groups[r.w+'-'+r.l]||[]).push(t);});
    const pairs=[];
    Object.keys(groups).forEach(k=>{const g=groups[k].slice().sort((a,b)=>rec.get(a).seed-rec.get(b).seed);
      while(g.length>=2)pairs.push([g.shift(),g.pop()]);}); // top seed vs bottom seed within the record group
    pairs.forEach(([x,y])=>{const rx=rec.get(x),ry=rec.get(y);
      const stakes=Math.max(rx.w,rx.l,ry.w,ry.l)>=2;
      const s=simSeries(x,y,stakes?2:1,ctx?Object.assign({},ctx,{round:'Swiss'}):null);
      rec.get(s.winner).w++;rec.get(s.loser).l++;});
    active=active.filter(t=>{const r=rec.get(t);if(r.w>=3){advanced.push(t);return false;}if(r.l>=3){eliminated.push(t);return false;}return true;});
  }
  advanced.sort((a,b)=>rec.get(a).l-rec.get(b).l||b.gravl-a.gravl); // seed playoffs by Swiss record
  eliminated.sort((a,b)=>rec.get(b).w-rec.get(a).w||b.gravl-a.gravl);
  return {advanced,eliminated,rec};
}
function swissFeed(name,tier,swiss){
  const r=swiss.rec;const threeOh=swiss.advanced.filter(t=>r.get(t).l===0);
  feedPush('note',`${name} — Swiss stage`,`Sixteen teams, Swiss to eight. Into the playoffs: ${swiss.advanced.map(t=>`${esc(t.name)} <span class="faint">${r.get(t).w}–${r.get(t).l}</span>`).join(', ')}.${threeOh.length?` <b>${threeOh.map(t=>esc(t.name)).join(', ')}</b> ran the table 3–0.`:''} Out of the Swiss: ${swiss.eliminated.map(t=>esc(t.short)).join(', ')}.`);

    d("consistency",-(0.3+rnd()*0.7));d("read",0.4+rnd()*0.4);d("util",0.2);return;}

function locate(tag){

  if(sel==='series'){snap=finalBoxSnapshot(m.a,m.b,m.seriesBox);cap=`Series box · ${esc(m.a.name)} ${m.wins.a}–${m.wins.b} ${esc(m.b.name)}`;}
  else if(sel!=='cur'&&m.maps[+sel]){const mm=m.maps[+sel];snap=mm.box;cap=`Map ${+sel+1} · ${esc((mm.aWon?m.a:m.b).name)} ${Math.max(mm.sa,mm.sb)}–${Math.min(mm.sa,mm.sb)} on ${esc(mm.zone)}`;}
  else{snap=finalBoxSnapshot(m.a,m.b,mp.box);cap=`Map ${m.maps.length+1} · live · ${mp.sa}–${mp.sb} · round ${mp.round}`;}
  const hint=m.maps.length?`<div class="bx-cap" style="text-transform:none;letter-spacing:0;color:var(--muted)">Tap a map to review its box — e.g. game 1's stats while game 2 plays.</div>`:'';
  return `<div class="cast-tabs" style="flex-wrap:wrap;margin-bottom:8px">${tabs}</div>${hint}<div class="boxwrap"><div class="bx-cap">${cap}</div>${snap?snap.teams.map(boxSideHtml).join(''):'<p class="faint">No stats yet.</p>'}</div>`;
}
function bracketStrip(L){
  const tie=(p,w,live)=>`<span class="brk-tie ${live?'live':''}">${p[0].short}/${p[1].short}${w?` → <b>${w.short}</b>`:''}</span>`;
  let h=`<div class="bracket">`;
  if(L.swiss){const r=L.swiss.rec;
    h+=`<div class="brk-row"><span class="brk-lab">SW</span> <span class="faint">Swiss → 8:</span> ${L.swiss.advanced.map(t=>`<span class="brk-tie"><b>${t.short}</b> <span class="faint">${r.get(t).w}–${r.get(t).l}</span></span>`).join(" ")}</div>`;}
  h+=`<div class="brk-row"><span class="brk-lab">QF</span> ${L.qfPairs.map((p,i)=>tie(p,L.qfWinners[i],L.stage==='qf'&&i===L.matchIdx)).join(" ")}</div>`;
  if(L.stage!=='qf')h+=`<div class="brk-row"><span class="brk-lab">SF</span> ${L.sfPairs.map((p,i)=>tie(p,L.sfWinners[i],L.stage==='sf'&&i===L.matchIdx)).join(" ")}</div>`;
  if(L.stage==='f')h+=`<div class="brk-row"><span class="brk-lab">F</span> ${tie(L.fPair,null,true)}</div>`;
  return h+`</div>`;
}
function renderCast(){
  const el=$("p-cast");const L=world.live;
  if(L&&!L.done){
    const m=L.match,mp=m.map;
    const stageName=L.stage==='qf'?'Quarterfinals':L.stage==='sf'?'Semifinals':'Final';
    const matchNo=L.stage==='f'?'':` · Match ${L.matchIdx+1} of ${L.stage==='qf'?4:2}`;
    let h=`<div class="cast-head"><div class="cast-title">${L.name}</div><div class="cast-stage">${stageName}${matchNo}</div></div>`;
    h+=bracketStrip(L);
    h+=`<div class="scoreboard"><div class="sb-team">${esc(m.a.name)}</div><div class="sb-mid"><div class="sb-series">series ${m.wins.a}–${m.wins.b}</div><div class="sb-map">${mp.sa}–${mp.sb}</div><div class="sb-zone">${mp.round?`map ${m.maps.length+1} · last: ${mp.lastZone}`:`map ${m.maps.length+1} · first to 15`}</div></div><div class="sb-team">${esc(m.b.name)}</div></div>`;
    if(L.stage==='f'&&mp.round===0&&m.maps.length===0){
      if(L.stagePreview)h+=`<div class="desk"><div class="desk-label">From the desk · the stage</div>${fmtAI(L.stagePreview)}</div>`;
      else if(L.stagePreviewLoading)h+=`<div class="desk-loading">the desk is setting the stage…</div>`;
      else h+=`<button class="ctl narrate" data-act="stage">✦ Desk: set the stage</button>${L.stagePreviewErr?`<div class="desk-err">${esc(L.stagePreviewErr)}</div>`:''}`;
    }
    h+=`<div class="cast-ctl"><button class="ctl primary" data-act="round">▶ Round</button><button class="ctl" data-act="map">▶▶ Map</button><button class="ctl" data-act="match">⏭ Match</button>${L.stage!=='f'?'<button class="ctl" data-act="tofinal">⏩ To the Final</button>':''}<button class="ctl" data-act="auto">⏹ Auto-finish</button></div>`;
    h+=`<div class="cast-tabs"><button class="ctab ${L.view!=='box'?'on':''}" data-act="vlog">Play-by-play</button><button class="ctab ${L.view==='box'?'on':''}" data-act="vbox">Box score</button></div>`;
    if(L.view==='box')h+=boxTable(m,mp,L);
    else h+=`<div class="pbp">${L.log.map(l=>`<div class="pbp-line ${l.kind}">${esc(l.text)}</div>`).join("")}</div>`;
    el.innerHTML=h;return;
  }
  if(L&&L.done){
    const d=L.championData,fi=world.feed.find(f=>f.id===L.feedId);
    let h=`<div class="cast-head"><div class="cast-title">${L.name}</div><div class="cast-stage">Champions</div></div><div class="champ-banner"><div class="champ-name">${L.finalChamp.name}</div><div class="champ-sub">def. ${L.finalRun.name} ${d.score} — a ${d.cairnStyle} cairn at ${d.zone}</div></div>`;
    if(fi){
      if(fi.narrated)h+=`<div class="desk"><div class="desk-label">From the desk</div>${fmtAI(fi.narrated)}</div>`;
      else if(fi.narrating)h+=`<div class="desk-loading">the desk is calling it…</div>`;
      else h+=`<button class="ctl primary narrate" data-act="recap">✦ Have the desk call it</button>${fi.narrateError?`<div class="desk-err">${esc(fi.narrateError)}</div>`:''}`;
    }
    h+=`<div class="pbp" style="margin-top:14px">${L.log.slice(0,50).map(l=>`<div class="pbp-line ${l.kind}">${esc(l.text)}</div>`).join("")}</div>`;
    h+=`<button class="ctl" data-act="end" style="margin-top:14px">End broadcast</button>`;
    el.innerHTML=h;return;
  }
  if(world.pendingMajors&&world.pendingMajors.length){
    el.innerHTML=`<p class="hint">A championship is staged. Broadcast it round-by-round, or let it resolve on its own.</p>`+world.pendingMajors.map(e=>{const n=pendName(e),tr=pendTier(e);const lab=tr==='WC'?'World Championship':tr==='S'?'Masters':'Major';
      return `<div class="match"><span class="side"><span class="tag-pill">${lab}</span> ${esc(n)}</span><span class="side"><button class="ctl primary" data-act="broadcast" data-name="${esc(n)}" data-tier="${tr}">◉ Broadcast live</button> <button class="ctl" data-act="autosim" data-name="${esc(n)}" data-tier="${tr}">Auto-sim</button></span></div>`;}).join("");
    return;
  }
  el.innerHTML=`<div class="feed-empty">No championship staged. Sim a season — when its Major or World Championship comes up, you can broadcast it here, round by round.</div>`;
}

/* controls */
function doStage(){stepTick();render();switchTab(world.pendingMajors.length?'cast':'feed');}
function doSeason(){ // play through the rest of the current season's four stages
  let guard=0;do{stepTick();}while(world.tick<4&&guard++<8);
  autoResolveMajors();render();switchTab('feed');
}
function doFive(){for(let n=0;n<5;n++){let guard=0;do{stepTick();}while(world.tick<4&&guard++<8);}autoResolveMajors();render();switchTab('feed');}
function doReset(){world=newWorld();render();switchTab("feed");}
function switchTab(p){document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.p===p));
  document.querySelectorAll(".panel").forEach(s=>s.classList.toggle("active",s.id==="p-"+p));}
document.getElementById("tabs").addEventListener("click",e=>{const t=e.target.closest(".tab");if(t)switchTab(t.dataset.p);});
$("btnStage").addEventListener("click",doStage);
$("btnSeason").addEventListener("click",doSeason);
$("btnFive").addEventListener("click",doFive);
$("btnReset").addEventListener("click",doReset);
document.getElementById("p-players").addEventListener("click",e=>{
  const fb=e.target.closest("[data-filter]");if(fb){playerFilter=fb.dataset.filter;selectedPid=null;movePid=null;editPid=null;showCreate=false;renderPlayers();return;}
  const act=e.target.closest("[data-act]");
  if(act&&act.dataset.act==='newfa'){showCreate=!showCreate;renderPlayers();return;}
  if(act&&act.dataset.act==='docreate'){const g=id=>{const el=$(id);return el?el.value:'';};
    const p=mkFreeAgent(g('cf-first').trim(),g('cf-tag').trim(),g('cf-last').trim(),g('cf-role'),+g('cf-rating')||62);
    txn('sign',`New free agent created: ${nm(p)} (${p.role}).`);showCreate=false;selectedPid=p.id;render();return;}
  if(act&&act.dataset.p){const p=anyPlayerById(+act.dataset.p);if(!p){renderPlayers();return;}const a=act.dataset.act;
    if(a==='retire')retire(p,findHolderTeam(p));
    else if(a==='unretire'){unretire(p);feedPush('note','Back in the server',`${nm(p)} comes out of retirement.`);txn('return',`${nm(p)} un-retires.`);}
    else if(a==='release')forceMove(p,null);
    else if(a==='pin')p.pinned=!p.pinned;
    else if(a==='edit')editPid=editPid===p.id?null:p.id;
    else if(a==='atrup')p.r[act.dataset.attr]=clamp(p.r[act.dataset.attr]+3,28,99);
    else if(a==='atrdn')p.r[act.dataset.attr]=clamp(p.r[act.dataset.attr]-3,28,99);
    else if(a==='ageup')p.age=clamp(p.age+1,16,45);
    else if(a==='agedn')p.age=clamp(p.age-1,16,45);
    else if(a==='rolecycle')p.role=ROLES[(ROLES.indexOf(p.role)+1)%ROLES.length];
    else if(a==='movestart')movePid=movePid===p.id?null:p.id;
    else if(a==='moveto'){const to=world.teams.find(t=>t.short===act.dataset.to);if(to)forceMove(p,to);movePid=null;selectedPid=p.id;}
    render();return;}
  const th=e.target.closest("th[data-s]");if(th){sortKey=th.dataset.s;renderPlayers();return;}
  const row=e.target.closest("[data-pid]");if(row){const id=+row.dataset.pid;selectedPid=selectedPid===id?null:id;movePid=null;editPid=null;renderPlayers();}
});
document.getElementById("p-teams").addEventListener("click",e=>{
  const rv=e.target.closest('[data-act="revive"]');if(rv){const d=(world.defunct||[]).find(x=>x.short===rv.dataset.tid);
    if(d){const t=reviveOrg(d,{byHand:true});teamFilter='all';selectedTid=t?t.short:null;render();switchTab('teams');}return;}
  const fb=e.target.closest("[data-tfilter]");if(fb){teamFilter=fb.dataset.tfilter;selectedTid=null;renderTeams();return;}
  if(e.target.closest("[data-tclose]")){selectedTid=null;renderTeams();return;}
  const ts=e.target.closest("th[data-ts]");if(ts){teamSortKey=ts.dataset.ts;renderTeams();return;}
  const pr=e.target.closest("[data-tpid]");if(pr){const pid=+pr.dataset.tpid;const p=anyPlayerById(pid);selectedPid=pid;editPid=null;movePid=null;
    playerFilter=(p&&p.retired)?'retired':(p&&world.freeAgents.includes(p))?'fa':'active';renderPlayers();switchTab('players');return;}
  const row=e.target.closest("[data-tid]");if(row){selectedTid=selectedTid===row.dataset.tid?null:row.dataset.tid;renderTeams();}
});
document.getElementById("p-annals").addEventListener("click",e=>{
  const bx=e.target.closest("[data-box]");if(bx){const k=bx.dataset.box;expandedBoxKey=expandedBoxKey===k?null:k;renderAnnals();return;}
  const av=e.target.closest("[data-av]");if(av){annalsView=av.dataset.av;expandedBoxKey=null;renderAnnals();return;}
  const pr=e.target.closest("[data-tpid]");if(pr){const pid=+pr.dataset.tpid;const p=anyPlayerById(pid);if(!p)return;selectedPid=pid;editPid=null;movePid=null;
    playerFilter=p.retired?'retired':(world.freeAgents.includes(p))?'fa':'active';renderPlayers();switchTab('players');}
});
document.getElementById("p-feed").addEventListener("click",e=>{const btn=e.target.closest("[data-narrate]");if(btn)narrate(+btn.dataset.narrate);});
document.getElementById("p-cast").addEventListener("click",e=>{const el=e.target.closest("[data-act]");if(!el)return;const a=el.dataset.act;
  if(a==='round')liveRound();else if(a==='map')liveMap();else if(a==='match')liveMatch();else if(a==='tofinal')liveToFinal();else if(a==='auto')liveAuto();
  else if(a==='broadcast')liveSetup(el.dataset.name,el.dataset.tier);else if(a==='autosim'){autoOneEvent(el.dataset.name,el.dataset.tier);render();}else if(a==='stage')narrateStage();
  else if(a==='recap'){const L=world.live;if(L&&L.feedId!=null)narrate(L.feedId);}else if(a==='end')endBroadcast();
  else if(a==='vbox'){if(world.live){world.live.view='box';renderCast();}}else if(a==='vlog'){if(world.live){world.live.view='log';renderCast();}}
  else if(a==='boxsel'){if(world.live){world.live.boxSel=el.dataset.sel;renderCast();}}});

world=newWorld();render();
</script>
</body>
